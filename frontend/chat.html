<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Audio Intel — Recommendations</title>
    <meta name="description" content="Chat with Audio Intel AI for personalized headphone recommendations." />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="chat.css" />
</head>

<body>
    <div class="bg-glow">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon">🎧</div><span>Audio Intel</span>
        </a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
        <div class="nav-links" id="navLinks">
            <!-- Populated dynamically by auth.js -->
        </div>
    </nav>

    <main class="chat-layout">
        <!-- Left Sidebar: Filters -->
        <aside class="sidebar-left">
            <div class="sidebar-title">🔍 Filters</div>

            <!-- Type Filter -->
            <div class="filter-group">
                <label>Product Type</label>
                <div class="type-chips" id="typeChips">
                    <button class="type-chip active" data-type="all">All</button>
                    <button class="type-chip" data-type="headphone">🎧 Headphone</button>
                    <button class="type-chip" data-type="tws">🎵 TWS</button>
                    <button class="type-chip" data-type="neckband">🔗 Neckband</button>
                    <button class="type-chip" data-type="earphone">🎶 Earphone</button>
                </div>
            </div>

            <!-- Connectivity: Wired / Wireless -->
            <div class="filter-group">
                <label>Connectivity</label>
                <div class="type-chips" id="connectChips">
                    <button class="type-chip active" data-connect="all">All</button>
                    <button class="type-chip" data-connect="wired">🔌 Wired</button>
                    <button class="type-chip" data-connect="wireless">📶 Wireless</button>
                </div>
            </div>

            <!-- Budget Slider -->
            <div class="filter-group">
                <label>Budget Range</label>
                <div class="budget-slider-container">
                    <div class="slider-track-wrapper">
                        <input type="range" id="budgetSlider" class="budget-slider" min="0" max="10000" value="5000" step="100"
                            oninput="updateBudget(this.value)" />
                        <div class="slider-fill" id="sliderFill"></div>
                    </div>
                    <div class="budget-ticks">
                        <span class="tick" data-val="0">৳0</span>
                        <span class="tick" data-val="2000">৳2k</span>
                        <span class="tick" data-val="4000">৳4k</span>
                        <span class="tick" data-val="6000">৳6k</span>
                        <span class="tick" data-val="8000">৳8k</span>
                        <span class="tick" data-val="10000">৳10k</span>
                    </div>
                    <div class="budget-display" id="budgetDisplay">Around <strong>5,000</strong></div>
                </div>
            </div>

            <!-- Use Case -->
            <div class="filter-group">
                <label>Use Case</label>
                <select class="filter-select" id="useCaseFilter">
                    <option value="general">General</option>
                    <option value="music">🎵 Music</option>
                    <option value="gaming">🎮 Gaming</option>
                    <option value="travel">✈️ Travel</option>
                    <option value="studio">🎚️ Studio</option>
                </select>
            </div>

            <button class="apply-btn btn btn-primary" onclick="applyFilters()">Apply Filters</button>
            <button class="reset-btn" onclick="resetFilters()">↺ Reset All</button>
        </aside>

        <!-- Chat Center -->
        <section class="chat-center">
            <div class="chat-messages" id="chatMessages">
                <div class="chat-welcome" id="chatWelcome">
                    <div class="emoji">🎧</div>
                    <h2>What headphones are you <span class="text-gradient">looking for?</span></h2>
                    <p>Tell me your preferences and I'll recommend the perfect pair for you.</p>
                    <div class="quick-prompts">
                        <button class="quick-prompt" onclick="sendQuick(this.textContent)">Best for bass-heavy
                            music</button>
                        <button class="quick-prompt" onclick="sendQuick(this.textContent)">Under $100 wireless</button>
                        <button class="quick-prompt" onclick="sendQuick(this.textContent)">Noise canceling for
                            travel</button>
                        <button class="quick-prompt" onclick="sendQuick(this.textContent)">Gaming headset + mic</button>
                        <button class="quick-prompt" onclick="sendQuick(this.textContent)">Best neckband
                            earphones</button>
                        <button class="quick-prompt" onclick="sendQuick(this.textContent)">TWS for workouts</button>
                    </div>
                </div>
            </div>
            <div class="chat-input-bar">
                <div class="input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Describe your ideal headphones..."
                        onkeydown="if(event.key==='Enter')sendMessage()" />
                    <button class="send-btn" onclick="sendMessage()" aria-label="Send">➤</button>
                </div>
            </div>
        </section>

        <!-- Right Pane: Embedded Browser -->
        <aside class="browser-pane">
            <!-- <div class="browser-toolbar">
                <div class="browser-nav">
                    <button class="browser-btn" onclick="browserBack()" title="Back">←</button>
                    <button class="browser-btn" onclick="browserForward()" title="Forward">→</button>
                    <button class="browser-btn" onclick="browserReload()" title="Reload">⟳</button>
                </div>
                <div class="browser-address">
                    <span class="browser-icon">🌐</span>
                    <input type="text" class="browser-url" id="browserUrl"
                        placeholder="Click a product link in chat to open it here..."
                        onkeydown="if(event.key==='Enter')navigateBrowser(this.value)" />
                </div>
            </div> -->
            <div class="browser-viewport" id="browserViewport">
                <div class="browser-welcome" id="browserWelcome">
                    <div class="bw-icon">🛒</div>
                    <h3>Product Results</h3>
                    <p>Ask a question in the chat and matching products will appear here with store links.</p>
                </div>
                <div class="product-cards" id="productCards" style="display:none;"></div>
            </div>
        </aside>
    </main>

    <script src="auth.js"></script>
    <script src="chat.js"></script>
</body>

</html>
